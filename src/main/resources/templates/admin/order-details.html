<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		.navbar {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100%;
				    background-color: #2c2c2c; /* Example background */
				    z-index: 1000; /* Ensures navbar stays on top */
				}
				</style>
</head>

<body>
<nav class="navbar navbar-expand-lg  shadow-sm px-4" >
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="#" class="navbar-brand d-flex align-items-center">
                <img src="/img/SpiceTales.png" style="height: 40px;" class="me-2" alt="Logo" />
                <span class="fw-bold" style="color: #fc8019;">Spice Tales</span>
            </a>
        </div>
        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
            <li class="nav-item me-3">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/menu">Manage Menu</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/orders">View Orders</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/logout">Logout</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4 fw-semibold">Order Details</h2>

    <div class="card shadow-sm p-4">
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Order Time:</strong> <span th:text="${order.orderTime}"></span></p>
        <p><strong>Customer:</strong> <span th:text="${order.customer.username}"></span></p>

        <h5 class="mt-4">Items</h5>
        <table class="table table-bordered mt-3">
            <thead class="table-success">
                <tr>
                    <th>Dish</th>
                    <th>Quantity</th>
                    <th>Price (₹)</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.dishName}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.price}"></td>
                </tr>
            </tbody>
        </table>

        <div class="text-end fw-bold mt-3">
            Total Price: ₹<span th:text="${order.totalPrice}"></span>
        </div>
    </div>
</div>
<style>
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black; /* Adjust as needed */
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
 
<footer>
<p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>
</body>
</html>
