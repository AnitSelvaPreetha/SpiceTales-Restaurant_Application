<!-- src/main/resources/templates/admin/staff-view.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>View Staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4" style="max-width:720px;">
  <h3 class="mb-3">Staff Details</h3>

  <div th:if="${user == null}" class="alert alert-warning">
    Staff not found.
  </div>

  <div th:if="${user != null}">
    <dl class="row">
      <dt class="col-sm-3">ID</dt>
      <dd class="col-sm-9" th:text="${user.id}"></dd>

      <dt class="col-sm-3">Username</dt>
      <dd class="col-sm-9" th:text="${user.username}"></dd>

      <dt class="col-sm-3">Email</dt>
      <dd class="col-sm-9" th:text="${user.email}"></dd>

      <dt class="col-sm-3">Phone</dt>
      <dd class="col-sm-9" th:text="${user.phone}"></dd>

      <dt class="col-sm-3">Role</dt>
      <dd class="col-sm-9" th:text="${user.role}"></dd>
    </dl>

    <div class="d-flex">
      <a th:href="@{/admin/staff}" class="btn btn-secondary">Back to List</a>
      <form th:action="@{/admin/staff/delete/{id}(id=${user.id})}" method="post" style="margin-left:8px"
            onsubmit="return confirm('Delete this staff?');">
        <button class="btn btn-danger" type="submit">Delete</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
