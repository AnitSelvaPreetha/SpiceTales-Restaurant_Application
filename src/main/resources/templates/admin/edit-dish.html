<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Dish</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
		.navbar {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100%;
				    background-color:#2c2c2c; /* Example background */
				    z-index: 1000; /* Ensures navbar stays on top */
				}
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background: #fdf5e6;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-update {
            background-color: #fc8019;
            font-weight: bold;
            width: 100%;
            
        }
        
        .btn-update:hover{
        background-color: #fc8019;
        color:white;
        }

        label {
            font-weight: 600;
        }

        h2 {
            font-weight: bold;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg  shadow-sm px-4" >
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="#" class="navbar-brand d-flex align-items-center">
                <img src="/img/SpiceTales.jfif" style="height: 40px;" class="me-2">
                <span class="fw-bold" style="color: #fc8019;">Spice Taless</span>
            </a>
        </div>
        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning" href="/admin/menu">Manage Menu</a></li>
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning" href="/admin/orders">View Orders</a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-danger" href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="form-container">
    <h2 class="text-center">Edit Dish</h2>
    <form th:action="@{/admin/menu/update}" th:object="${dish}" method="post">

        <input type="hidden" th:field="*{id}"/>
       <input type="hidden" th:field="*{image}"/>
        <div class="mb-3">
            <label for="name" class="form-label">Name:</label>
            <input type="text" th:field="*{name}" id="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description:</label>
            <textarea th:field="*{description}" id="description" class="form-control" rows="3" required></textarea>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Price:</label>
            <input type="number" step="0.01" th:field="*{price}" id="price" class="form-control" required>
        </div>

        <div class="mb-4">
            <label for="category" class="form-label">Category:</label>
            <select th:field="*{category}" id="category" class="form-select" required>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" />
            </select>
        </div>





        </div>



        <button type="submit" class="btn btn-update" style="color:white">Update Dish</button>
    </form>
</div>
<style>
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black; /* Adjust as needed */
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
 
<footer>
<p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>
</body>
</html>
