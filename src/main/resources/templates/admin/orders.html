<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - All Orders</title>
    <link rel="stylesheet" href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
		.navbar {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100%;
				    background-color: #2c2c2c; /* Example background */
				    z-index: 1000; /* Ensures navbar stays on top */
				}
        .feedback-section {
            background-color: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .feedback-section strong {
            color: #fc8019;
        }

        .feedback-rating {
            font-size: 18px;
            color: #28a745;
            font-weight: bold;
        }

        .feedback-comment {
            font-size: 14px;
            color: #333;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg  shadow-sm px-4" >
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="/img/SpiceTales.jfif" style="height: 40px;" class="me-2"/>
                <span class="fw-bold" style="color: #fc8019;">Spice Tales</span>
            </a>
        </div>
        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
            <li class="nav-item me-3">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/menu">Manage Menu</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/logout">Logout</a>
            </li>
        </ul>
    </div>
</nav>
<br>

<h2 class="my-5">All Orders</h2>

<div th:each="order : ${orders}" class="order-card mb-3 p-3 shadow-sm rounded border">
    <a th:href="@{'/admin/bill/' + ${order.id}}" style="text-decoration: none; color: inherit;">
        <div class="d-flex justify-content-between">
            <div>
                <strong>Order ID:</strong> <span th:text="${order.id}"></span> |
                <strong>Customer:</strong> <span th:text="${order.customer.username}"></span><br>
                <strong>Date:</strong> <span th:text="${#temporals.format(order.orderTime, 'dd-MM-yyyy HH:mm')}"></span>
            </div>
            <div>
                <strong>Total:</strong> ₹<span th:text="${order.totalPrice}"></span>
            </div>
        </div>

        <!-- Order Items -->
        <ul class="mt-2" th:if="${order.items!=null and #lists.size(order.items)>0}" style="list-style-type: disc; padding-left: 20px;">
            <li th:each="item : ${order.items}"
                th:text="${item.dishName + ' - Qty: ' + item.quantity + ', Price: ₹' + item.price}"></li>
        </ul>
    </a>

    <!-- Feedback Section -->
    <div th:if="${order.feedback}" class="feedback-section">
        <strong>Customer Feedback:</strong>
        <div class="feedback-rating">Rating: <span th:text="${order.feedback.rating}"></span>/5</div>
        <p class="feedback-comment" th:text="${order.feedback.comment}"></p>
    </div>
</div>
<style>
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black; /* Adjust as needed */
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
 
<footer>
<p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>
</body>
</html>
