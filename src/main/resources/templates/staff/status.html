<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Staff - Order Status</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: #2c2c2c;
        z-index: 1000;
    }
    .section-title {
        font-family: 'Segoe UI', sans-serif;
        font-weight: 600;
        margin-top: 80px;
        margin-bottom: 20px;
    }
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black;
        color: white;
        text-align: center;
        padding: 10px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm px-4">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="/img/SpiceTales.jfif" style="height: 40px;" class="me-2" />
        <span class="fw-bold" style="color: #fc8019;">Spice Tales</span>
      </a>
    </div>
    <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
      <li class="nav-item me-3">
        <a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/reservations">View Reservations</a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/orders">View Orders</a>
      </li>
      <li class="nav-item">
        <a class="nav-link fw-bold text-danger text-decoration-none" href="/logout">Logout</a>
      </li>
    </ul>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-5 pt-5">
  <h2 class="section-title">Order Status Dashboard</h2>

  <table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
      <th>Order ID</th>
      <th>Dish Name</th>
      <th>Quantity</th>
      <th>Table Number</th>
      <th>Username</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="status : ${statuses}">
      <td th:text="${status.orderId}"></td>
      <td th:text="${status.dishName}"></td>
      <td th:text="${status.quantity}"></td>
      <td th:text="${status.tableNumber}"></td>
      <td th:text="${status.username}"></td>
      <td th:text="${status.status}"></td>
      <td>
        <form th:action="@{/staff/update-status}" method="post" class="d-inline">
          <input type="hidden" name="id" th:value="${status.id}" />
          <input type="hidden" name="status" value="IN_PROGRESS" />
          <button type="submit" class="btn btn-warning btn-sm">In-Progress</button>
        </form>
        <form th:action="@{/staff/update-status}" method="post" class="d-inline">
          <input type="hidden" name="id" th:value="${status.id}" />
          <input type="hidden" name="status" value="READY_TO_SERVE" />
          <button type="submit" class="btn btn-info btn-sm">Ready to Serve</button>
        </form>
        <form th:action="@{/staff/update-status}" method="post" class="d-inline">
          <input type="hidden" name="id" th:value="${status.id}" />
          <input type="hidden" name="status" value="COMPLETE" />
          <button type="submit" class="btn btn-success btn-sm">Complete</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>

</body>
</html>
