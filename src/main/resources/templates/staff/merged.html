<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Staff - Merged Orders</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #2c2c2c;
      z-index: 1000;
    }
    .section-title {
      margin-top: 90px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #000;
      color: #fff;
      text-align: center;
      padding: 10px;
    }
    .table-fixed-ellipsis td {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 360px;
    }
    .dish-list { list-style: none; padding-left: 0; margin-bottom: 0; }
    .dish-list li { line-height: 1.35; }
    .status-badge.NEW { background: #6c757d; color: #fff; }
    .status-badge.IN_PROGRESS { background: #ffc107; color: #212529; }
    .status-badge.READY_TO_SERVE { background: #0dcaf0; color: #000; }
    .status-badge.COMPLETE { background: #198754; color: #fff; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="/img/SpiceTales.png" style="height:40px" class="me-2" alt="logo" />
      <span class="fw-bold" style="color:#fc8019">Spice Tales</span>
    </a>

    <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
      <li class="nav-item me-3"><a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/reservations">View Reservations</a></li>
      <li class="nav-item me-3"><a class="nav-link fw-bold text-warning text-decoration-none" href="/admin/orders">View Orders</a></li>
      <li class="nav-item"><a class="nav-link fw-bold text-danger text-decoration-none" href="/logout">Logout</a></li>
    </ul>
  </div>
</nav>

<!-- Main content -->
<div class="container mt-5 pt-5">
  <h3 class="section-title">Merged Orders (FIFO)</h3>

  <div class="mb-3 d-flex gap-2">
    <form th:action="@{/staff/claim-next}" method="post" class="d-inline">
      <button type="submit" class="btn btn-primary btn-sm">Claim Next (mark In-Progress)</button>
    </form>
    <form th:action="@{/staff/migrate}" method="post" class="d-inline">
      <button type="submit" class="btn btn-secondary btn-sm">Migrate existing orders</button>
    </form>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover table-fixed-ellipsis">
      <thead class="table-dark">
      <tr>
        <th>Order ID</th>
        <th>Dishes</th>
        <th>Total Qty</th>
        <th>Table</th>
        <th>Username</th>
        <th>Overall Status</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="o : ${aggregatedOrders}">
        <td th:text="${o.orderId}">101</td>

        <td>
          <ul class="dish-list">
            <li th:each="line : ${o.dishLines}" th:text="${line}">Idly --> 6</li>
          </ul>
        </td>

        <td th:text="${o.totalQuantity}">6</td>
        <td th:text="${o.tableNumber}">5</td>
        <td th:text="${o.username}">alice</td>

        <td>
          <span class="badge status-badge" th:classappend="' ' + 'status-badge-' + o.overallStatus" th:text="${o.overallStatus}">NEW</span>
        </td>

        <td>
          <div class="d-flex gap-1 flex-wrap">
            <form th:action="@{/staff/update-order-status}" method="post" class="d-inline">
              <input type="hidden" name="orderId" th:value="${o.orderId}" />
              <input type="hidden" name="status" value="IN_PROGRESS" />
              <button type="submit" class="btn btn-warning btn-sm">In-Progress</button>
            </form>

            <form th:action="@{/staff/update-order-status}" method="post" class="d-inline">
              <input type="hidden" name="orderId" th:value="${o.orderId}" />
              <input type="hidden" name="status" value="READY_TO_SERVE" />
              <button type="submit" class="btn btn-info btn-sm">Ready to Serve</button>
            </form>

            <form th:action="@{/staff/update-order-status}" method="post" class="d-inline">
              <input type="hidden" name="orderId" th:value="${o.orderId}" />
              <input type="hidden" name="status" value="COMPLETE" />
              <button type="submit" class="btn btn-success btn-sm">Complete</button>
            </form>
          </div>
        </td>
      </tr>

      <tr th:if="${#lists.isEmpty(aggregatedOrders)}">
        <td colspan="7" class="text-center">No active orders</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
