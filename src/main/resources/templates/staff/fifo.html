<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Staff FIFO</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background-color: #2c2c2c; z-index: 1000; }
        .section-title { margin-top: 80px; margin-bottom: 20px; font-weight:600; }
        footer { position: fixed; bottom: 0; width:100%; background:black; color:white; padding:10px; text-align:center; }
    </style>
</head>
<body>
<div class="container mt-5 pt-5">
    <h2 class="section-title">Staff FIFO Queue</h2>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>Dish</th>
            <th>Qty</th>
            <th>Table</th>
            <th>User</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="os : ${statuses}">
            <td th:text="${os.dishName}"></td>
            <td th:text="${os.quantity}"></td>
            <td th:text="${os.tableNumber}"></td>
            <td th:text="${os.username}"></td>
            <td th:text="${os.status}"></td>
            <td>
                <form th:action="@{/staff/update-status}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${os.id}" />
                    <input type="hidden" name="status" value="IN_PROGRESS" />
                    <button type="submit" class="btn btn-warning btn-sm">In-Progress</button>
                </form>
                <form th:action="@{/staff/update-status}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${os.id}" />
                    <input type="hidden" name="status" value="READY_TO_SERVE" />
                    <button type="submit" class="btn btn-info btn-sm">Ready to Serve</button>
                </form>
                <form th:action="@{/staff/update-status}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${os.id}" />
                    <input type="hidden" name="status" value="COMPLETE" />
                    <button type="submit" class="btn btn-success btn-sm">Complete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
