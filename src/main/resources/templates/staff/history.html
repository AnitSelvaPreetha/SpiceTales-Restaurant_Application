<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Completed Orders</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5 pt-4">
  <h2>Completed Orders (History)</h2>
  <table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Order ID</th>
      <th>Dish</th>
      <th>Qty</th>
      <th>Table</th>
      <th>User</th>
      <th>Status</th>
      <th>Completed At</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="h : ${history}">
      <td th:text="${h.id}">1</td>
      <td th:text="${h.orderId}">101</td>
      <td th:text="${h.dishName}">Paneer</td>
      <td th:text="${h.quantity}">2</td>
      <td th:text="${h.tableNumber}">5</td>
      <td th:text="${h.username}">alice</td>
      <td th:text="${h.status}">COMPLETE</td>
      <td th:text="${#temporals.format(h.completedAt, 'dd-MM-yyyy HH:mm:ss')}">...</td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
