<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Staff - Menu</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .navbar {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          background-color:#2c2c2c;
          z-index: 1000;
        }
        .section-title {
          margin-top: 12px;
          margin-bottom: 20px;
          font-weight: 600;
        }
        footer {
          position: fixed;
          bottom: 0;
          width: 100%;
          background-color: black;
          color: white;
          text-align: center;
          padding: 10px;
        }
        .card-img-top {
          height: 160px;
          object-fit: cover;
        }
        .dish-actions .btn {
          width: 48%;
        }
        .search-row { gap: 12px; margin-bottom: 18px; }
        .category-pill { cursor: pointer; }
        /* content spacing so fixed navbar/footer don't cover content */
        .page-content { padding-top: 95px; padding-bottom: 70px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm px-4">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/staff/menu}">
            <img src="/img/SpiceTales.png" style="height:40px" class="me-2" alt="logo" />
            <span class="fw-bold" style="color:#fc8019">Spice Tales</span>
        </a>

        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
<!--            <li class="nav-item me-3">-->
<!--                <a class="nav-link fw-bold text-warning text-decoration-none" th:href="@{/staff/orders-merged}">Orders</a>-->
<!--            </li>-->
<!--            <li class="nav-item me-3">-->
<!--                <a class="nav-link fw-bold text-warning text-decoration-none" th:href="@{/staff/fifo}">FIFO Queue</a>-->
<!--            </li>-->
            <li class="nav-item me-3">
                <a class="nav-link fw-bold text-warning text-decoration-none" th:href="@{/staff/history}">History</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold text-danger text-decoration-none" th:href="@{/logout}">Logout</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Page content -->
<div class="container page-content">
    <!-- Directly embedded FIFO table (no fragment) -->
    <div class="row">
        <div class="col-12">
            <h2 class="section-title">Orders </h2>

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                <tr>
<!--                    <th>ID</th>-->
<!--                    <th>Order ID</th>-->
                    <th>Dish</th>
                    <th>Qty</th>
                    <th>Table</th>
                    <th>User</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="os : ${statuses}">
<!--                    <td th:text="${os.id}"></td>-->
<!--                    <td th:text="${os.orderId}"></td>-->
                    <td th:text="${os.dishName}"></td>
                    <td th:text="${os.quantity}"></td>
                    <td th:text="${os.tableNumber}"></td>
                    <td th:text="${os.username}"></td>
                    <td th:text="${os.status}"></td>
                    <td>
                        <form th:action="@{/staff/update-status}" method="post" class="d-inline">
                            <input type="hidden" name="id" th:value="${os.id}" />
                            <input type="hidden" name="status" value="IN_PROGRESS" />
                            <button type="submit" class="btn btn-warning btn-sm">In-Progress</button>
                        </form>
                        <form th:action="@{/staff/update-status}" method="post" class="d-inline ms-1">
                            <input type="hidden" name="id" th:value="${os.id}" />
                            <input type="hidden" name="status" value="READY_TO_SERVE" />
                            <button type="submit" class="btn btn-info btn-sm">Ready</button>
                        </form>
                        <form th:action="@{/staff/update-status}" method="post" class="d-inline ms-1">
                            <input type="hidden" name="id" th:value="${os.id}" />
                            <input type="hidden" name="status" value="COMPLETE" />
                            <button type="submit" class="btn btn-success btn-sm">Complete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${statuses == null or #lists.isEmpty(statuses)}">
                    <td colspan="8" class="text-center">No orders Available</td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
