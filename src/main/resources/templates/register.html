<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
	<link rel="stylesheet" href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="@{/css/bg-blur.css}">
	<link rel="stylesheet" href="@{/css/footer.css}">
	
	<style>
			body {
			    background-image: url('/img/restaurantLogo.png'); /* Replace with your actual image URL */
			    background-size: cover; /* Ensures the image covers the entire screen */
			    background-attachment: fixed; /* Keeps the background fixed while scrolling */
			    background-position: center; /* Centers the image */
			    background-repeat: no-repeat; /* Prevents the image from repeating */
           
            font-family: 'Segoe UI', sans-serif;
        }
		.bg-blur {
		    background: rgba(255, 255, 255, 0.2); /* Semi-transparent background */
		    backdrop-filter: blur(10px); /* Apply blur effect */
		    -webkit-backdrop-filter: blur(10px); /* Ensures support for Safari */
		    border-radius: 12px; /* Smooth edges */
		    padding: 30px;
		}
        .register-container {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            background: whte;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }
        .form-label {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .form-control {
            border-radius: 6px;
        }
        .btn-register {
            width: 100%;
            background-color: #fc8019;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-register:hover {
            background-color: #084298;
        }
        h2 {
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
   
    <div class="register-container bg-blur" style="max-width: 400px; width:100%; margin-left:250px; margin-top:120px;">

        <h2 style="color:#fc8019">Register</h2>
     <div th:if="${error}" class="alert alert-danger">
          <p th:text="${error}"></p>

        </div>
        <form th:action="@{/register}" method="post" >
			<div class="mb-3">
			    <label class="form-label" style="color:#2c3e50">User Name</label>
			    <input type="text" class="form-control" name="username"
			        minlength="5" maxlength="10" pattern=".{5,10}" 
			        title="Username must be between 5 and 10 characters" required>
			</div>

            <div class="mb-3">
                <label class="form-label" style="color:#2c3e50">Password</label>
                <input type="password" class="form-control" name="password"
                       title="Password must be at least 6 characters and contain a letter, number, and special character"
                       required pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{6,}$" >
            </div>
            <div class="mb-3">
                <label class="form-label" style="color:#2c3e50">Email</label>
                <input type="email" class="form-control" name="email" required>
            </div>
			<div class="mb-4">
			    <label class="form-label" style="color:#2c3e50">Phone</label>
			    <input type="tel" class="form-control" name="phone"
			           required pattern="[0-9]{10}" maxlength="10"
			           title="Please enter a valid 10-digit mobile number">
			</div>
<!--            <div class="mb-3">-->
<!--                <label class="form-label">Date of Birth</label>-->
<!--                <input th:field="*{dob}" type="date" class="form-control" required/>-->
<!--                <div th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}" class="text-danger small"></div>-->
<!--            </div>-->
            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" name="dob" required
                   max="2010-09-17" title="You must be at least 15 years old to register">
            </div>

            <button type="submit" class="btn btn-register" style="color:white">Register</button>
        </form>
    </div>
	

	<style>
	    footer {
	        position: fixed;
	        bottom: 0;
	        width: 100%;
	        background-color: black; /* Adjust as needed */
	        color: white;
	        text-align: center;
	        padding: 10px;
	    }
	</style>

	 
	<footer>
	<p>&copy; 2025 Spice Tales. All rights reserved.</p>
	</footer>		
</body>
<footer>

	    </footer>
		
</html>
