<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile</title>
    <link rel="stylesheet" href="@{/css/style.css}">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
		.navbar {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100%;
				    background-color: #2c2c2c; /* Example background */
				    z-index: 1000; /* Ensures navbar stays on top */
				}
        .profile-header {
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 15px;
        }
 
        .order-card, .reservation-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #fdf5e6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
 
        .order-info, .reservation-info {
            font-size: 14px;
        }
 
        .order-info strong, .reservation-info strong {
            color: #333;
        }
 
        .order-items, .reservation-details {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
 
        .order-items li, .reservation-details li {
            padding: 3px 0;
        }
 
        .past-orders-title, .reservations-title {
            font-weight: 600;
            font-size: 20px;
            margin-top: 30px;
            margin-bottom: 15px;
        }
 
        .text-muted {
            font-size: 14px;
        }
 
        .nav-link.active {
            color: #fc8019 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg  shadow-sm px-4" >
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a href="#" class="navbar-brand d-flex align-items-center">
                <img src="/img/SpiceTales.png" style="height: 40px;" class="me-2" />
                <span class="fw-bold" style="color: #fc8019;">Spice Tales</span>
            </a>
        </div>
        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
            <li class="nav-item me-3">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/customer/menu">Menu</a>
            </li>
            <li class="nav-item me-3">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/customer/orders">Your Orders</a>
            </li>
            <li class="nav-item me-3">
                <a class="nav-link fw-bold text-warning text-decoration-none" href="/reservations" >My Reservations</a>
            </li>
            <li class="nav-item">
                <a class="nav-link fw-bold text-danger text-decoration-none" href="/logout">Logout</a>
            </li>
        </ul>
    </div>
</nav>
 
<div class="container py-4 my-5">
    <h2 class="profile-header">My Profile</h2>
    <p><strong>Name:</strong> <span th:text="${user.username}"></span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
    <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
 
    <div id="ordersSection">
        <h3 class="past-orders-title">Past Orders</h3>
        <div th:each="order : ${pastOrders}" class="order-card mb-3 p-3 shadow-sm rounded border">
            <a th:href="@{/customer/bill/{id}(id=${order.id})}" style="text-decoration: none; color: inherit;">
                <div class="order-info">
                    <strong>Order ID:</strong> <span th:text="${order.id}"></span> |
<!--                    <strong>Total:</strong> ₹<span th:text="${order.totalPrice}"></span> -->|
                    <strong>Date:</strong>
                    <span th:text="${#temporals.format(order.orderTime, 'dd-MM-yyyy HH:mm')}"></span>
                </div>
                <!--<ul class="order-items mt-2">
                    <li th:each="item : ${order.items}"
                        th:text="${item.dishName + ' - Qty: ' + item.quantity + ', Price: ₹' + item.price}"></li>
                </ul>-->
            
<ul class="list-group mt-2">
    <li class="list-group-item d-flex align-items-center justify-content-between"
        th:each="item : ${order.items}">
        
         <!--Dish Name--> 
        <span class="fw-bold flex-grow-1" th:text="${item.dishName}"></span>

         <!--Quantity--> 
        <span class="badge bg-primary px-3 mx-2" th:text="|Qty: ${item.quantity}|"></span>

         <!--Price--> 
        <span class="fw-bold text-success" th:text="|₹${item.price}|"></span>
    </li>
</ul>

<!-- Total Price -->
<div class="mt-3 text-end">
    <strong>Total:</strong> ₹<span class="fw-bold text-danger" th:text="${order.totalPrice}"></span>
</div>





</a>
 
            <!-- Feedback Button -->
            <div class="mt-3" th:unless="${order.feedback}">
                <button class="btn btn-warning fw-bold px-3 py-2 shadow-sm" onclick="toggleFeedbackForm(this)">
                    Leave Feedback
                </button>
            </div>
			
			<div class="mt-3" th:if="${order.feedback}">
			                <button class="btn btn-success fw-bold px-3 py-2 shadow-sm" onclick="toggleFeedbackForm(this)" disabled>
			                    Feedback Submitted
			                </button>
			            </div>
 
            <!-- Feedback Form (Hidden by Default) -->
            <div class="mt-3 feedback-form" style="display: none;">
                <form th:action="@{/feedback/{id}(id=${order.id})}" method="post">
                    <input type="hidden" name="orderId" th:value="${order.id}" />
                    <label for="rating"><strong>Rate Your Order (1 to 5):</strong></label>
                    <input type="number" class="form-control mt-2" name="rating" min="1" max="5" required />
                    <label for="comment" class="mt-3"><strong>Write Your Feedback:</strong></label>
                    <textarea class="form-control mt-2" name="comment" rows="3" placeholder="Share your thoughts..." required></textarea>
                    <button type="submit" class="btn btn-success fw-bold px-3 py-2 mt-3">Submit Feedback</button>
                </form>
            </div>
        </div>
    </div>
 
    <div id="reservationsSection" style="display: none;">
        <h3 class="reservations-title">My Reservations</h3>
        <div th:each="reservation : ${reservations}" class="reservation-card mb-3 p-3 shadow-sm rounded border">
            <div class="reservation-info">
                <strong>Reservation ID:</strong> <span th:text="${reservation.id}"></span> |
                <strong>Date:</strong> <span th:text="${reservation.checkIn}"></span> |
                <strong>Guests:</strong> <span th:text="${reservation.noOfGuests}"></span>
				<strong>Check In:</strong> <span th:text="${reservation.checkIn}"></span>
				<strong>Created At:</strong> <span th:text="${reservation.createdAt}"></span>
				<strong>Status:</strong> <span th:text="${reservation.status}"></span>
            </div>
            
        </div>
    </div>
</div>
 
<!-- JavaScript -->
<script>
function toggleFeedbackForm(button) {
    var feedbackForm = button.closest('.order-card').querySelector('.feedback-form');
    feedbackForm.style.display = (feedbackForm.style.display === "none") ? "block" : "none";
}
 
function showReservations() {
    document.getElementById('ordersSection').style.display = 'none';
    document.getElementById('reservationsSection').style.display = 'block';
}
</script>
 
 
<style>
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black; /* Adjust as needed */
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
 
<footer>
    <p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>
</body>
</html>
