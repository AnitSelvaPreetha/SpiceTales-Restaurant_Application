<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
		.navbar {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100%;
				    background-color:#2c2c2c; /* Example background */
				    z-index: 1000; /* Ensures navbar stays on top */
				}
        .order-card {
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            padding: 20px;
            margin-bottom: 20px;
            background-color:#fdf5e6;
        }
        .order-header {
            font-weight: 600;
            color: #fc8019;
        }
        .order-items {
            font-size: 0.95rem;
            color: #555;
        }
        .total-price {
            font-weight: bold;
            color: #27ae60;
        }
        .btn-view {
            background-color: #fc8019;
            color: white;
        }
        .btn-view:hover {
            background-color: #e1701a;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg shadow-sm px-4" >
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/img/SpiceTales.jfif" style="height: 40px;" class="me-2">
            <span class="fw-bold" style="color: #fc8019;">Spice Tales</span>
        </a>
        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning text-decoration-none" href="/customer/menu">Menu</a></li>
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning text-decoration-none" href="/customer/profile">Profile</a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-warning text-decoration-none" href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container py-4 my-5">
    <h2 class="mb-4">Your Orders</h2>

    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header mb-2">
            Order ID: <span th:text="${order.id}"></span>
        </div>
        <div class="order-items mb-2">
            <ul class="list-unstyled mb-0">
                <li th:each="item : ${order.items}">
                    <span th:text="${item.dishName}">Dish Name</span> -
                    Qty: <span th:text="${item.quantity}"></span>,
                    Price: ₹<span th:text="${item.price}"></span>
                </li>
            </ul>
        </div>
        <div class="d-flex justify-content-between align-items-center">
            <span class="total-price">Total Price: ₹<span th:text="${order.totalPrice}"></span></span>
            <a th:href="@{'/customer/bill/' + ${order.id}}" class="btn btn-view btn-sm">View Bill</a>
        </div>
    </div>
</div>
<style>
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black; /* Adjust as needed */
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
 
<footer>
<p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>
</body>
</html>
