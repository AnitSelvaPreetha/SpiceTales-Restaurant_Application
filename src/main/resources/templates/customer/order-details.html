<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Food Order: Summary and Receipt</title>
    <link rel="stylesheet" href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
		.navbar {
				    position: fixed;
				    top: 0;
				    left: 0;
				    width: 100%;
				    background-color:#2c2c2c; /* Example background */
				    z-index: 1000; /* Ensures navbar stays on top */
				}
        .receipt-box {
            background-color: #fdf5e6;
            border: 1px solid #e2e2e2;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        .receipt-title {
            font-weight: 700;
            font-size: 1.5rem;
            border-bottom: 2px solid #fc8019;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .receipt-info p {
            margin-bottom: 6px;
            font-size: 15px;
        }
        .receipt-item {
            border-bottom: 1px dashed #ccc;
            padding: 10px 0;
        }
        .receipt-item:last-child {
            border-bottom: none;
        }
        .receipt-total {
            font-weight: 700;
            font-size: 18px;
            text-align: end;
            color: #333;
        }
        .receipt-buttons .btn {
            margin-right: 10px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg  shadow-sm px-4 mb-4" >
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/img/SpiceTales.png" style="height: 40px;" class="me-2">
            <span class="fw-bold" style="color: #fc8019;">Spice Tales</span>
        </a>
        <ul class="navbar-nav d-flex flex-row align-items-center mb-0">
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning" href="/customer/menu">Menu</a></li>
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning" href="/customer/orders">Your Orders</a></li>
            <li class="nav-item me-3"><a class="nav-link fw-bold text-warning" href="/customer/profile">Profile</a></li>
            <li class="nav-item"><a class="nav-link fw-bold text-danger" href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container my-5">
    <div id="receipt-content" class="receipt-box">
        <div class="receipt-title">Food Order: Summary and Receipt</div>
        <div class="receipt-info mb-4">
            <p><strong>Order ID:</strong> <span th:text="${order.id}">26</span></p>
            <p><strong>Date:</strong> <span th:text="${order.formattedOrderTime}">Date</span></p>
            <p><strong>Customer:</strong> <span th:text="${order.customer.username}">John</span></p>
            <p><strong>Phone:</strong> <span th:text="${order.customer.phone}">9876543210</span></p>
        </div>

        <div th:each="item : ${order.items}" class="receipt-item d-flex justify-content-between">
            <div>
                <p class="mb-0 fw-semibold" th:text="${item.dishName}">Dish Name</p>
                <small>Qty: <span th:text="${item.quantity}">1</span> × ₹<span th:text="${#numbers.formatDecimal(item.price, 1, 2)}">50</span></small>
            </div>
            <div>
                ₹<span th:text="${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}">100</span>
            </div>
        </div>

        <div class="receipt-total mt-4">
            Total: ₹<span th:text="${#numbers.formatDecimal(order.totalPrice, 1, 2)}">200</span>
        </div>
    </div>

    <div class="receipt-buttons mt-4 d-flex justify-content-start">
        <button class="btn btn-outline-primary" onclick="window.print()">Print</button>
        <button class="btn btn-success" onclick="downloadPDF()">Download PDF</button>
     
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    function downloadPDF() {
        const element = document.getElementById("receipt-content");
        html2canvas(element, { scale: 2 }).then(canvas => {
            const imgData = canvas.toDataURL("image/png");
            const pdf = new jspdf.jsPDF("p", "mm", "a4");

            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

            pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
            pdf.save("Order_Receipt.pdf");
        });
    }




    function printReceipt() {
        const printContents = document.getElementById("receipt-content").innerHTML;
        const originalContents = document.body.innerHTML;

        document.body.innerHTML = printContents;
        window.print();
        document.body.innerHTML = originalContents;
        window.location.reload(); // reload to restore event bindings
    }
</script>
    
<style>
    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        background-color: black; /* Adjust as needed */
        color: white;
        text-align: center;
        padding: 10px;
    }
</style>
 
<footer>
<p>&copy; 2025 Spice Tales. All rights reserved.</p>
</footer>
</body>
</html>
